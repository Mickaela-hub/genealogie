<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Généalogie - Arbre Dynamique</title>
    
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
    <div class="header-section logo-area">
        <h1>Archives Familiales</h1>
        <div class="stat-badge">
            <span id="stat-count">0</span> membres
        </div>
    </div>

    <div class="header-section view-controls">
        <div class="control-group">
            <button class="btn-view" onclick="setDirection('H', 'L')" title="Gauche à Droite">➡️</button>
            <button class="btn-view" onclick="setDirection('H', 'R')" title="Droite à Gauche">⬅️</button>
            <span class="separator"></span>
            <button class="btn-view" onclick="setDirection('V', 'T')" title="Haut en Bas">⬇️</button>
            <button class="btn-view" onclick="setDirection('V', 'B')" title="Bas en Haut">⬆️</button>
        </div>
    </div>

    <div class="header-section menu-area">
        <nav class="controls">
            <input type="checkbox" id="menu-toggle" class="menu-toggle">
            <label for="menu-toggle" class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </label>
            
            <div class="menu-content">
                <p class="menu-label">Navigation</p>
                <ul class="nav-links">
                    <li><a href="index.html">🌳 Voir l'Arbre</a></li>
                    <li><a href="gestionnaire.html">📇 Fiches Détaillées</a></li>
                    <li><a href="donnees.html">✍️ Saisie & Modification</a></li>
                    <li><a href="arbre.html">🌳Imprimer mon arbre</a></li>
                    <li><a href="contact.html">✏️ Contact</a></li>
                </ul>
                <hr class="menu-divider">
                <p class="menu-label">Gestion des données</p>
                <input type="file" id="upload-csv" accept=".xlsx, .xls, .json, .ods" style="display:none;">
                <button onclick="exportModelExcel()">📝 Modèle Excel</button>
                <button onclick="document.getElementById('upload-csv').click()">📁 Importer</button>
                <button onclick="generateFamilyBook()">📖 Générer le Livre</button>
                <button type="button" onclick="exportData()">💾 Sauvegarder (.json)</button>
                <button class="btn-danger" onclick="clearAll()">🗑️ Effacer tout</button>
            </div>
        </nav>
    </div>
</header>

    <main id="tree-container"></main>

    <script src="script.js"></script>
</body>
</html>
